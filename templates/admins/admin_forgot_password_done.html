<script src="https://cdn.tailwindcss.com"></script>

<!-- Inter Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- ✅ Material Icons -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
    body {
        font-family: 'Inter', sans-serif;
    }
</style>

<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 px-4">

    <div class="w-full max-w-md">

        <!-- Card -->
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 
                    rounded-2xl shadow-sm p-8 text-center transition">

            <!-- Icon container -->
            <div class="w-14 h-14 mx-auto flex items-center justify-center 
                        rounded-full bg-gray-100 dark:bg-gray-700 mb-5">
                <span class="material-icons text-gray-700 dark:text-gray-200 text-3xl">
                    mark_email_read
                </span>
            </div>

            <!-- Title -->
            <h2 class="text-xl font-semibold text-gray-900 dark:text-white tracking-tight">
                Check your email
            </h2>

            <!-- Description -->
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-2 leading-relaxed">
                We’ve sent a password reset link to your email. 
                Follow the instructions to reset your password.
            </p>

            <!-- Button -->
            <a href="{% url 'admin_login' %}"
               class="mt-6 inline-flex items-center justify-center w-full
                      py-2.5 text-sm font-medium rounded-lg
                      bg-black text-white hover:bg-gray-900
                      transition duration-200">
                Back to login
            </a>

            <!-- Secondary hint -->
            <p class="text-xs text-gray-400 dark:text-gray-500 mt-5">
                Didn’t receive the email? Check your spam folder or try again.
            </p>

        </div>

    </div>

</div>

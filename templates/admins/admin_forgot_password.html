<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Inter', sans-serif;
    }
</style>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

<div class="w-full max-w-md">

    <!-- Logo / Branding -->
    <div class="text-center mb-8">
        <h1 class="text-2xl font-semibold text-gray-800 tracking-tight">
            Reset your password
        </h1>
        <p class="text-sm text-gray-500 mt-2">
            Enter your email and we’ll send you a reset link
        </p>
    </div>

    <!-- Card -->
    <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-8">

        <form method="post" class="space-y-5">
            {% csrf_token %}

            <!-- Messages -->
            {% if messages %}
                {% for message in messages %}
                    <div class="text-sm text-green-600 bg-green-50 border border-green-200 px-4 py-2 rounded-lg">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <!-- Email Field -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Email address
                </label>

                <input type="email" name="email" required
                       placeholder="you@example.com"
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg
                              focus:outline-none focus:ring-2 focus:ring-black focus:border-black
                              transition text-sm">
            </div>

            <!-- Button -->
            <button type="submit"
                    class="w-full py-2.5 bg-black text-white text-sm font-medium rounded-lg
                           hover:bg-gray-900 transition">
                Send reset link
            </button>

        </form>

        <!-- Divider -->
        <div class="my-6 flex items-center">
            <div class="flex-1 h-px bg-gray-200"></div>
            <span class="px-3 text-xs text-gray-400">OR</span>
            <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <!-- Back to login -->
        <div class="text-center">
            <a href="{% url 'admin_login' %}"
               class="text-sm text-gray-600 hover:text-black transition">
                Back to login
            </a>
        </div>

    </div>

</div>

</body>
</html>

{% extends 'dashboard/base.html' %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white p-8 rounded-lg shadow-lg">
    <h2 class="text-2xl font-bold mb-6 text-center">Forgot Password</h2>

    <form method="POST" action="">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-gray-700 mb-1">Enter your email</label>
            <input type="email" name="email" class="w-full border-b p-2 focus:outline-none focus:border-blue-500" required>
        </div>

        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded font-semibold">Send Reset Link</button>
    </form>

    <div class="text-center mt-4">
        <a href="{% url 'login' %}" class="text-blue-600 hover:underline text-sm">Back to Login</a>
    </div>
</div>
{% endblock %}

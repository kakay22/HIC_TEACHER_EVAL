<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluation Submitted</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body class="min-h-screen bg-gray-50 flex items-center justify-center px-4">

    <div class="fade-in w-full max-w-md bg-white 
                rounded-2xl 
                shadow-[0_10px_40px_rgba(0,0,0,0.06)] 
                border border-gray-200 
                p-8 text-center">

        <!-- Success Icon -->
        <div class="flex justify-center mb-5">
            <div class="relative">
                <div class="absolute inset-0 rounded-full bg-green-200 blur-xl opacity-40"></div>

                <div class="relative bg-green-100 text-green-600 rounded-full p-4">
                    <svg xmlns="http://www.w3.org/2000/svg" 
                         class="h-7 w-7" 
                         fill="none" 
                         viewBox="0 0 24 24" 
                         stroke="currentColor" 
                         stroke-width="2">
                        <path stroke-linecap="round" 
                              stroke-linejoin="round" 
                              d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Title -->
        <h1 class="text-2xl font-semibold text-gray-900 tracking-tight mb-2">
            Submission successful
        </h1>

        <!-- Message -->
        <p class="text-sm text-gray-500 leading-relaxed mb-6">
            Your evaluation has been submitted successfully.  
            Thank you for taking the time to share your feedback.
        </p>

        <!-- Button -->
        <a href="/"
           class="inline-flex items-center justify-center w-full
                  bg-black text-white text-sm font-medium
                  py-3 rounded-lg
                  hover:bg-gray-900
                  active:scale-[0.98]
                  transition-all duration-200
                  shadow-sm hover:shadow-md">

            Back to home
        </a>

        <!-- Divider -->
        <div class="my-6 border-t border-gray-100"></div>

        <!-- Footer -->
        <p class="text-xs text-gray-400">
            Evaluation System
        </p>

    </div>

</body>
</html>
